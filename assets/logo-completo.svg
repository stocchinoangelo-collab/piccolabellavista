<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <!-- Logo Piccola Bellavista - Versione completa -->
  
  <!-- Sfondo bianco -->
  <rect width="800" height="600" fill="#ffffff"/>
  
  <!-- Cornice esterna decorativa -->
  <rect x="20" y="20" width="760" height="560" 
        fill="none" 
        stroke="#1e6091" 
        stroke-width="2"/>
  
  <!-- ICONA: Casa con balcone vista mare -->
  <g transform="translate(400, 200)">
    
    <!-- Sole/Cerchio luce dietro -->
    <circle cx="0" cy="-30" r="80" fill="#fef3c7" opacity="0.6"/>
    
    <!-- Mare/Onde sotto -->
    <path d="M -150 60 Q -100 50 -50 60 T 50 60 T 150 60 L 150 90 L -150 90 Z" 
          fill="#90e0ef"/>
    <path d="M -150 70 Q -100 65 -50 70 T 50 70 T 150 70" 
          fill="none" 
          stroke="#1e6091" 
          stroke-width="2"
          opacity="0.4"/>
    
    <!-- Casa - corpo principale -->
    <rect x="-50" y="-20" width="100" height="80" 
          fill="#fefae0" 
          stroke="#264653" 
          stroke-width="2"/>
    
    <!-- Tetto della casa -->
    <polygon points="-60,-20 0,-70 60,-20" 
             fill="#e76f51" 
             stroke="#264653" 
             stroke-width="2"/>
    
    <!-- Porta -->
    <rect x="-12" y="20" width="24" height="40" 
          fill="#1e6091" 
          stroke="#264653" 
          stroke-width="1"/>
    
    <!-- Finestra sinistra -->
    <rect x="-38" y="-5" width="20" height="20" 
          fill="#90e0ef" 
          stroke="#264653" 
          stroke-width="1"/>
    <line x1="-28" y1="-5" x2="-28" y2="15" stroke="#264653" stroke-width="1"/>
    <line x1="-38" y1="5" x2="-18" y2="5" stroke="#264653" stroke-width="1"/>
    
    <!-- Finestra destra -->
    <rect x="18" y="-5" width="20" height="20" 
          fill="#90e0ef" 
          stroke="#264653" 
          stroke-width="1"/>
    <line x1="28" y1="-5" x2="28" y2="15" stroke="#264653" stroke-width="1"/>
    <line x1="18" y1="5" x2="38" y2="5" stroke="#264653" stroke-width="1"/>
    
    <!-- BALCONE - elemento centrale del brand! -->
    <rect x="-30" y="35" width="60" height="3" fill="#264653"/>
    <line x1="-25" y1="38" x2="-25" y2="50" stroke="#264653" stroke-width="1"/>
    <line x1="-15" y1="38" x2="-15" y2="50" stroke="#264653" stroke-width="1"/>
    <line x1="-5" y1="38" x2="-5" y2="50" stroke="#264653" stroke-width="1"/>
    <line x1="5" y1="38" x2="5" y2="50" stroke="#264653" stroke-width="1"/>
    <line x1="15" y1="38" x2="15" y2="50" stroke="#264653" stroke-width="1"/>
    <line x1="25" y1="38" x2="25" y2="50" stroke="#264653" stroke-width="1"/>
    
    <!-- Camino -->
    <rect x="20" y="-55" width="12" height="20" fill="#264653"/>
    
    <!-- Stella decorativa sul tetto -->
    <text x="0" y="-40" text-anchor="middle" font-size="18" fill="#fef3c7" font-weight="bold">★</text>
    
  </g>
  
  <!-- TESTO LOGO - Piccola -->
  <text x="400" y="370" 
        text-anchor="middle" 
        font-family="Georgia, serif" 
        font-size="36" 
        font-style="italic"
        fill="#e76f51">
    Piccola
  </text>
  
  <!-- TESTO LOGO - Bellavista -->
  <text x="400" y="430" 
        text-anchor="middle" 
        font-family="Georgia, serif" 
        font-size="58" 
        font-weight="bold"
        fill="#1e6091">
    Bellavista
  </text>
  
  <!-- Linea decorativa sotto -->
  <line x1="250" y1="450" x2="550" y2="450" stroke="#e76f51" stroke-width="1"/>
  <circle cx="400" cy="450" r="4" fill="#e76f51"/>
  
  <!-- Sottotitolo -->
  <text x="400" y="490" 
        text-anchor="middle" 
        font-family="Georgia, serif" 
        font-size="16" 
        font-style="italic"
        fill="#264653">
    Il tuo nido panoramico a Cagliari
  </text>
  
  <!-- Indirizzo (footer) -->
  <text x="400" y="540" 
        text-anchor="middle" 
        font-family="Arial, sans-serif" 
        font-size="12" 
        letter-spacing="3"
        fill="#588157">
    PIRRI · CAGLIARI · SARDEGNA
  </text>
  
</svg>
